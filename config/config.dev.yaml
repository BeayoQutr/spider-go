# 开发环境配置
app:
  port: 8080
  env: dev
cors:
  # CORS 跨域配置
  allow_origins:
    - "http://localhost:3000"
    - "http://localhost:5173"
    - "http://127.0.0.1:3000"
    - "http://127.0.0.1:5173"
  allow_methods:
    - "GET"
    - "POST"
    - "PUT"
    - "DELETE"
    - "OPTIONS"
  allow_headers:
    - "Origin"
    - "Content-Type"
    - "Authorization"
    - "Accept"
  expose_headers:
    - "Content-Length"
  allow_credentials: true
  max_age: 43200  # 12小时

# 开发数据库配置
database:
  driver: mysql
  source: 127.0.0.1
  port: 3306
  user: spider_dev
  pass: spider_dev_2024
  name: spider_go_dev

# 开发 Redis 配置（统一使用同一个 Redis 实例）
redis:
  # 会话缓存数据库（DB 0: 会话、DAU、配置、用户数据缓存）
  session:
    host: 127.0.0.1:6379
    pass: ""
    db: 0
  # 验证码数据库（DB 1: 验证码）
  captcha:
    host: 127.0.0.1:6379
    pass: ""
    db: 1

jwt:
  secret: "dev_secret_key_change_in_production"
  issuer: "spider-go-dev"

jwc:
  # 登录模式：campus（校园网内） 或 webvpn（外网 WebVPN）
  mode: "webvpn"

  # 校园网内配置
  campus:
    login_url: "https://cas.csuft.edu.cn/cas/login?service=https%3A%2F%2Fportal.csuft.edu.cn%2F%3Fpath%3Dhttps%253A%252F%252Fportal.csuft.edu.cn%252Fmain.html%2523%252F"
    redirect_url: "http://jwgl.csuft.edu.cn/Logon.do?method=logonByZnlkd"
    course_url: "http://jwgl.csuft.edu.cn/jsxsd/xskb/xskb_list.do"
    grade_url: "http://jwgl.csuft.edu.cn/jsxsd/kscj/cjcx_list"
    grade_level_url: "http://jwgl.csuft.edu.cn/jsxsd/kscj/djkscj_list"
    exam_url: "http://jwgl.csuft.edu.cn/jsxsd/xsks/xsksap_list"
    # 教评系统配置
    evaluation_redirect_url: "https://cas.csuft.edu.cn/cas/login?service=https%3A%2F%2Fjxzlpt.csuft.edu.cn%3A443%2Fcas%2FtoUrl%3Ftype%3Dpc"
    evaluation_info_url: "https://jxzlpt.csuft.edu.cn/api/xspj/xspj/getXspjtask"
    evaluation_do_login_url: "https://jxzlpt.csuft.edu.cn/api/manage/cas/doLogin"

  # WebVPN 配置
  webvpn:
    login_url: "https://https-cas-csuft-edu-cn-443.webvpn.csuft.edu.cn/cas/login?service=https://webvpn.csuft.edu.cn/callback/cas/eAF0IG5N"
    webvpn_token_url: "https://webvpn.csuft.edu.cn/api/access/auth/finish"
    redirect_url: "https://http-jwgl-csuft-edu-cn-80.webvpn.csuft.edu.cn/Logon.do?method=logonByZnlkd"
    course_url: "https://http-jwgl-csuft-edu-cn-80.webvpn.csuft.edu.cn/jsxsd/xskb/xskb_list.do"
    grade_url: "https://http-jwgl-csuft-edu-cn-80.webvpn.csuft.edu.cn/jsxsd/kscj/cjcx_list"
    grade_level_url: "https://http-jwgl-csuft-edu-cn-80.webvpn.csuft.edu.cn/jsxsd/kscj/djkscj_list"
    exam_url: "https://http-jwgl-csuft-edu-cn-80.webvpn.csuft.edu.cn/jsxsd/xsks/xsksap_list"
    # 教评系统配置（WebVPN 模式下也需要访问教评平台）
    evaluation_redirect_url: "https://cas.csuft.edu.cn/cas/login?service=https%3A%2F%2Fjxzlpt.csuft.edu.cn%3A443%2Fcas%2FtoUrl%3Ftype%3Dpc"
    evaluation_info_url: "https://jxzlpt.csuft.edu.cn/api/xspj/xspj/getXspjtask"
    evaluation_do_login_url: "https://jxzlpt.csuft.edu.cn/api/manage/cas/doLogin"

  # 公共配置
  rsa_url: "https://cas.csuft.edu.cn/cas/jwt/publicKey"
  mfa_detect_url: "https://cas.csuft.edu.cn/cas/mfa/detect"
  captcha_url: "https://cas.csuft.edu.cn/cas/needCaptcha.html?"
  captcha_image_url: "https://cas.csuft.edu.cn/cas/captcha.html?"

email:
  # SMTP 邮件服务器配置（开发环境可以使用测试邮箱）
  smtp_host: "smtp.qq.com"
  smtp_port: 465
  username: "your_email@qq.com"
  password: ""
  from_name: "Spider-Go 验证码 [DEV]"

wx:
  app_id: ""
  app_secret: ""

# 对象存储配置
oss:
  # 存储服务提供商: aliyun (阿里云 OSS) 或 tencent (腾讯云 COS)
  provider: "tencent"

  # 阿里云 OSS 配置
  aliyun:
    endpoint: "oss-cn-hangzhou.aliyuncs.com"  # OSS 访问域名
    access_key_id: "your_aliyun_access_key_id"
    access_key_secret: "your_aliyun_access_key_secret"
    bucket_name: "spider-go-dev"
    base_url: ""  # 文件访问的基础 URL
    use_cdn: false  # 是否使用 CDN 加速域名
    cdn_domain: ""  # CDN 加速域名（如果启用）

  # 腾讯云 COS 配置
  tencent:
    region: "ap-guangzhou"  # COS 区域
    secret_id: "your_tencent_secret_id"
    secret_key: "your_tencent_secret_key"
    bucket_name: ""
    base_url: ""  # 文件访问的基础 URL
    use_cdn: false  # 是否使用 CDN 加速域名
    cdn_domain: ""  # CDN 加速域名（如果启用）

  # 通用配置
  upload_path: "uploads/"  # 上传文件的根路径
  max_file_size: 5242880  # 最大文件大小（字节），默认 5MB
  allowed_extensions:  # 允许上传的文件扩展名
    - ".jpg"
    - ".jpeg"
    - ".png"
    - ".gif"
    - ".pdf"
    - ".doc"
    - ".docx"
    - ".xls"
    - ".xlsx"


